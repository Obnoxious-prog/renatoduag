<!DOCTYPE html>
<html>
<head>
    <title>Moving Ball Animation</title>

    <style>
        #container {
            width: 600px;
            height: 100px;
            border: 2px solid black;
            position: relative;
            margin-top: 20px;
        }

        #ball {
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            left: 0px;
            top: 25px;
        }
    </style>
</head>
<body>

    <h2>Moving Ball Animation</h2>

    <button onclick="startAnimation()">
        Start Animation
    </button>

    <div id="container">
        <div id="ball"></div>
    </div>

    <script>

        function startAnimation() {

            let ball =
                document.getElementById("ball");

            let position = 0;

            let animation =
                setInterval(moveBall, 50);

            function moveBall() {

                if (position >= 500) {
                    clearInterval(animation);
                }
                else {
                    position += 5;
                    ball.style.left =
                        position + "px";
                }
            }
        }

    </script>

</body>
</html>
